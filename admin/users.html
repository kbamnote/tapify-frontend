<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Tapify Admin</title>
    <link rel="icon" type="image/png" href="../images/tapify-logo-green.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../admin-style.css">
    <link rel="stylesheet" href="../vcards-style.css">
</head>
<body>

    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="sidebar-logo">
                <img src="../images/tapify-logo-green.png" alt="Tapify"><span>Tapify</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie nav-icon"></i><span>Dashboard</span></a>
            <a href="users.html" class="nav-item active"><i class="fas fa-users nav-icon"></i><span>Users</span></a>
            <a href="vcards.html" class="nav-item"><i class="fas fa-id-card nav-icon"></i><span>vCards</span></a>
            <a href="dynamic-qr.html" class="nav-item"><i class="fas fa-qrcode nav-icon"></i><span>Dynamic QR</span></a>
            <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check nav-icon"></i><span>Appointments</span></a>
            <a href="inquiries.html" class="nav-item"><i class="fas fa-info-circle nav-icon"></i><span>Inquiries</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog nav-icon"></i><span>Settings</span></a>
            <a href="notifications.html" class="nav-item"><i class="fas fa-bell nav-icon icon-notifications"></i><span>Push Notifications</span></a>
            <a href="titanium.html" class="nav-item"><i class="fas fa-crown nav-icon" style="color:#c1a046"></i><span>Titanium Members</span></a>
            <a href="leads.html" class="nav-item"><i class="fas fa-users nav-icon" style="color:#2ecc71"></i><span>Leads</span></a>
            <a href="review-funnel.html" class="nav-item"><i class="fas fa-star nav-icon" style="color:#f59e0b"></i><span>Reviews Funnel</span></a>
        </nav>
    </aside>

    <div class="admin-main" id="adminMain">
        <header class="admin-header">
            <div class="header-left">
                <button class="hamburger-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h1 class="page-title">User Management</h1>
            </div>
            <div class="header-right">
                <button class="btn-new-vcard" onclick="showAddUserModal()">
                    <i class="fas fa-user-plus"></i> Add User
                </button>
            </div>
        </header>

        <main class="admin-content">
            <div class="vcards-table-wrapper">
                <table class="vcards-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>vCards</th>
                            <th>Status</th>
                            <th>Last Login</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Loaded by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetPwModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
        <div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,0.2)">
            <h3 style="margin:0 0 4px;font-family:Poppins,sans-serif">Reset Password</h3>
            <p style="margin:0 0 16px;font-size:0.85rem;color:#6b7280">Set a new password for <strong id="resetPwEmail"></strong>. The existing password cannot be viewed.</p>
            <input type="hidden" id="resetPwUserId">
            <input type="password" id="resetPwInput" placeholder="New password (min 6 chars)" autocomplete="new-password"
                   style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.95rem;box-sizing:border-box">
            <div id="resetPwMsg" style="font-size:0.8rem;margin-top:8px;min-height:16px"></div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
                <button onclick="closeResetPasswordModal()" style="padding:9px 16px;border:1px solid #d1d5db;background:#fff;border-radius:8px;cursor:pointer">Cancel</button>
                <button id="resetPwSubmit" onclick="submitResetPassword()" style="padding:9px 16px;border:none;background:#8338ec;color:#fff;border-radius:8px;cursor:pointer">Set Password</button>
            </div>
        </div>
    </div>

    <script src="../admin.js"></script>
    <script>
        const USER_API = 'https://app.tapify.co.in/api/admin/users/list.php';
        const RESET_PW_API = 'https://app.tapify.co.in/api/admin/users/reset-password.php';

        function showResetPasswordModal(userId, email) {
            document.getElementById('resetPwUserId').value = userId;
            document.getElementById('resetPwEmail').textContent = email;
            document.getElementById('resetPwInput').value = '';
            document.getElementById('resetPwMsg').textContent = '';
            document.getElementById('resetPwModal').style.display = 'flex';
            document.getElementById('resetPwInput').focus();
        }

        function closeResetPasswordModal() {
            document.getElementById('resetPwModal').style.display = 'none';
        }

        async function submitResetPassword() {
            const userId = document.getElementById('resetPwUserId').value;
            const newPassword = document.getElementById('resetPwInput').value;
            const msg = document.getElementById('resetPwMsg');
            const btn = document.getElementById('resetPwSubmit');

            if (!newPassword || newPassword.length < 6) {
                msg.style.color = '#dc2626';
                msg.textContent = 'Password must be at least 6 characters.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Saving...';
            try {
                const response = await fetch(RESET_PW_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ user_id: Number(userId), new_password: newPassword })
                });
                const result = await response.json();
                if (result.success) {
                    msg.style.color = '#16a34a';
                    msg.textContent = result.message || 'Password reset successfully.';
                    setTimeout(closeResetPasswordModal, 1200);
                } else {
                    msg.style.color = '#dc2626';
                    msg.textContent = result.message || 'Failed to reset password.';
                }
            } catch (err) {
                msg.style.color = '#dc2626';
                msg.textContent = 'Network error. Please try again.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Set Password';
            }
        }

        document.addEventListener('DOMContentLoaded', loadUsers);

        function escUser(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        }

        // Render a single row defensively — a bad/incomplete record can never
        // throw and blank the whole table; it's shown highlighted instead.
        function renderUserRow(user) {
            try {
                user = user || {};
                const rawName = (user.name != null && String(user.name).trim() !== '') ? String(user.name) : '';
                const name = rawName || '(no name)';
                const initial = rawName ? rawName.charAt(0).toUpperCase() : '?';
                const role = user.role ? String(user.role).toUpperCase() : 'USER';
                const email = (user.email != null && String(user.email).trim() !== '') ? String(user.email) : '';
                const vcards = (user.vcards_count != null) ? user.vcards_count : 0;
                const isActive = (user.status == 1);
                const lastLogin = user.last_login ? String(user.last_login) : 'Never';
                const incomplete = !rawName || !email || !user.role;
                const emailParam = email.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                return `
                    <tr${incomplete ? ' style="background:#fff7ed"' : ''}>
                        <td>
                            <div style="display:flex;align-items:center;gap:10px">
                                <div style="width:35px;height:35px;background:#8338ec;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold">${escUser(initial)}</div>
                                <div>
                                    <div style="font-weight:600">${escUser(name)}${incomplete ? ' <span title="Incomplete record" style="color:#f59e0b">&#9888;</span>' : ''}</div>
                                    <div style="font-size:0.75rem;color:#6b7280">${escUser(role)}</div>
                                </div>
                            </div>
                        </td>
                        <td>${email ? escUser(email) : '<span style="color:#9ca3af">—</span>'}</td>
                        <td>${escUser(vcards)}</td>
                        <td><span class="badge ${isActive ? 'bg-success' : 'bg-danger'}">${isActive ? 'Active' : 'Inactive'}</span></td>
                        <td>${escUser(lastLogin)}</td>
                        <td>
                            <button class="action-btn" title="Edit"><i class="fas fa-pen"></i></button>
                            <button class="action-btn" title="Reset Password" onclick="showResetPasswordModal(${Number(user.id) || 0}, '${emailParam}')"><i class="fas fa-key"></i></button>
                            <button class="action-btn text-danger" title="Delete"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            } catch (e) {
                return `<tr style="background:#fef2f2"><td colspan="6" style="color:#dc2626">&#9888; Could not display user #${escUser(user && user.id)} (${escUser(e.message)})</td></tr>`;
            }
        }

        async function loadUsers() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:#6b7280">Loading…</td></tr>';
            try {
                const response = await fetch(USER_API, { credentials: 'include' });
                if (response.status === 401) { window.location.href = '/login'; return; }
                const result = await response.json();
                if (!result.success) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;color:#dc2626">${escUser(result.message || 'Failed to load users')}</td></tr>`;
                    return;
                }
                const users = (result.data && Array.isArray(result.data.users)) ? result.data.users : [];
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:#6b7280">No users found.</td></tr>';
                    return;
                }
                tbody.innerHTML = users.map(renderUserRow).join('');
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:#dc2626">Network error loading users. Please refresh.</td></tr>';
            }
        }
    </script>
</body>
</html>

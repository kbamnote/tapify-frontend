<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Builder - Tapify Dashboard</title>

    <link rel="icon" type="image/png" href="../images/tapify-logo-green.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../admin-style.css">
    <style>
        /* The builder is a full editor, so give it the whole content area with no
           padding. The iframe height is sized in JS to fill from wherever it
           starts down to the viewport bottom, so it always fits exactly. */
        .builder-content { padding: 0 !important; overflow: hidden; }
        #builderFrame { width: 100%; border: 0; display: block; background: #f8fafc; }
        .builder-fallback { padding: 24px; text-align: center; }
    </style>
</head>
<body>

    <!-- =============== SIDEBAR =============== -->
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="sidebar-logo">
                <img src="../images/tapify-logo-green.png" alt="Tapify">
                <span>Tapify</span>
            </a>
            <button class="sidebar-toggle-mobile" onclick="toggleSidebar()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="sidebar-search">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search..." id="sidebarSearch">
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-pie nav-icon"></i>
                <span>Dashboard</span>
            </a>
            <a href="appointments.html" class="nav-item">
                <i class="fas fa-calendar-check nav-icon"></i>
                <span>Appointments</span>
            </a>
            <a href="inquiries.html" class="nav-item">
                <i class="fas fa-info-circle nav-icon"></i>
                <span>Inquiries</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user nav-icon"></i>
                <span>My Profile</span>
            </a>
            <a href="whatsapp-stores.html" class="nav-item">
                <i class="fab fa-whatsapp nav-icon"></i>
                <span>WhatsApp Stores</span>
            </a>
            <a href="whatsapp-orders.html" class="nav-item">
                <i class="fas fa-shopping-bag nav-icon"></i>
                <span>WhatsApp Product Order</span>
            </a>
            <a href="reviews.html" class="nav-item">
                <i class="fas fa-star nav-icon"></i>
                <span>Reviews Funnel</span>
            </a>
            <a href="website-builder.html" class="nav-item active">
                <i class="fas fa-globe nav-icon"></i>
                <span>Website Builder</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="manage-subscription.html" class="subscription-btn">
                <i class="fas fa-gem"></i>
                <span>Manage Subscription</span>
            </a>
        </div>
    </aside>

    <!-- =============== MAIN CONTENT =============== -->
    <div class="admin-main" id="adminMain">

        <!-- TOP HEADER -->
        <header class="admin-header">
            <div class="header-left">
                <button class="hamburger-btn" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">Website Builder</h1>
            </div>

            <div class="header-right">
                <div class="header-dropdown">
                    <button class="header-btn lang-btn" onclick="toggleDropdown('langDropdown')">
                        <span class="flag-icon">🇺🇸</span>
                        <span>English</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" id="langDropdown">
                        <a href="#"><span class="flag-icon">🇺🇸</span> English</a>
                        <a href="#"><span class="flag-icon">🇮🇳</span> हिन्दी</a>
                    </div>
                </div>
                <button class="header-btn theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <button class="header-btn notif-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge">3</span>
                </button>
                <div class="header-dropdown profile-dropdown">
                    <button class="profile-btn" onclick="toggleDropdown('profileDropdown')">
                        <img src="../images/tapify-logo-green.png" alt="Profile" class="profile-avatar">
                        <span id="headerProfileName">Loading...</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu profile-menu" id="profileDropdown">
                        <div class="profile-info">
                            <img src="../images/tapify-logo-green.png" alt="Profile">
                            <div>
                                <strong id="headerUserName">Loading...</strong>
                                <small id="headerUserEmail"></small>
                            </div>
                        </div>
                        <hr>
                        <a href="profile.html"><i class="fas fa-user"></i> Account Settings</a>
                        <a href="../login.html" class="logout-link"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- BUILDER (embedded) -->
        <main class="admin-content builder-content">
            <iframe
                id="builderFrame"
                title="Website Builder"
                src="https://builder.tapify.co.in/builder"
                allow="clipboard-write; fullscreen"></iframe>
        </main>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../admin.js"></script>
    <script>
        // Size the builder iframe to fill from where it starts to the bottom of
        // the viewport — robust to any header height or sidebar state.
        (function () {
            var frame = document.getElementById('builderFrame');
            function fit() {
                if (!frame) return;
                var top = frame.getBoundingClientRect().top;
                frame.style.height = Math.max(360, window.innerHeight - top) + 'px';
            }
            window.addEventListener('resize', fit);
            window.addEventListener('load', fit);
            // The sidebar toggle animates width; re-fit shortly after a click.
            document.addEventListener('click', function (e) {
                if (e.target.closest('.hamburger-btn, .sidebar-toggle-mobile')) setTimeout(fit, 350);
            });
            fit();
        })();
    </script>
</body>
</html>

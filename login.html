<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Tapify | The Future of Business Networking</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/tapify-logo-green.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #6a28c9 0%, #8338ec 50%, #a855f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background circles */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: #FFD700;
            top: -100px;
            left: -100px;
            animation: float-bg 8s ease-in-out infinite;
        }

        body::after {
            width: 500px;
            height: 500px;
            background: #a855f7;
            bottom: -150px;
            right: -150px;
            animation: float-bg 10s ease-in-out infinite reverse;
        }

        @keyframes float-bg {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        .language-selector {
            position: absolute;
            top: 25px;
            right: 30px;
            z-index: 10;
        }

        .lang-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 50px 45px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0,0,0,0.25);
            position: relative;
            z-index: 1;
            animation: slide-up 0.6s ease;
        }

        @keyframes slide-up {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-logo {
            height: 65px;
            width: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 12px rgba(131, 56, 236, 0.3));
        }

        .login-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #212121;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #6c757d;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #8338ec;
            font-size: 1rem;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            height: 55px;
            background: #f0f4ff;
            border: 2px solid transparent;
            border-radius: 14px;
            padding: 0 50px 0 50px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            background: white;
            border-color: #8338ec;
            box-shadow: 0 0 0 4px rgba(131, 56, 236, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
            z-index: 2;
        }

        .password-toggle:hover {
            color: #8338ec;
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #495057;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: #8338ec;
            cursor: pointer;
        }

        .forgot-link {
            color: #8338ec;
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-link:hover {
            color: #6a28c9;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            height: 55px;
            background: linear-gradient(135deg, #8338ec, #a855f7);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(131, 56, 236, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: #adb5bd;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e9ecef;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .signup-text {
            text-align: center;
            color: #6c757d;
            font-size: 0.95rem;
        }

        .signup-text a {
            color: #8338ec;
            font-weight: 600;
            text-decoration: none;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        .back-home {
            position: absolute;
            top: 25px;
            left: 30px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-home:hover {
            background: rgba(255,255,255,0.3);
            color: white;
        }

        .alert-message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .alert-message.show { display: block; }

        .alert-error {
            background: #fee;
            color: #dc3545;
            border-left: 4px solid #dc3545;
        }

        .alert-success {
            background: #efe;
            color: #28a745;
            border-left: 4px solid #28a745;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 35px 25px;
            }

            .login-header h2 {
                font-size: 1.5rem;
            }

            .back-home, .language-selector {
                top: 15px;
            }

            .back-home { left: 15px; padding: 6px 14px; font-size: 0.8rem; }
            .language-selector { right: 15px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="language-selector">
        <button class="lang-btn">
            <i class="fas fa-globe me-1"></i> English <i class="fas fa-chevron-down ms-1"></i>
        </button>
    </div>

    <div class="login-container">
        <div class="login-header">
            <img src="images/tapify-logo-green.png" alt="Tapify" class="login-logo">
            <h2>Welcome Back</h2>
            <p>Sign in to manage your Tapify account</p>
        </div>

        <div class="alert-message" id="alertMessage"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-row">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>

            <div class="divider">OR</div>

            <p class="signup-text">
                New to Tapify? <a href="#">Create an Account</a>
            </p>
        </form>
    </div>

    <script>
        // Password toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.className = 'alert-message alert-' + type + ' show';

            setTimeout(() => {
                alert.classList.remove('show');
            }, 4000);
        }

        // Handle login - Real API call to backend
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const btn = document.querySelector('.login-btn');

            if (!email || !password) {
                showAlert('Please fill all fields', 'error');
                return;
            }

            // Show loading state
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;

            try {
                const response = await fetch('https://tapify-backend-production.up.railway.app/api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // Important for sessions!
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Login successful! Redirecting...', 'success');

                    // Store user info
                    if (remember) {
                        localStorage.setItem('tapify_user', JSON.stringify(result.data.user));
                    } else {
                        sessionStorage.setItem('tapify_user', JSON.stringify(result.data.user));
                    }

                    setTimeout(() => {
                        const user = result.data.user;
                        if (user.role === 'admin') {
                            window.location.href = 'admin/dashboard.html';
                        } else {
                            window.location.href = 'dashboard/dashboard.html';
                        }
                    }, 1500);
                } else {
                    showAlert(result.message || 'Login failed', 'error');
                    btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Connection error. Make sure backend is set up. Error: ' + error.message, 'error');
                btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
                btn.disabled = false;
            }
        }

        // Auto-fill if remembered
        window.addEventListener('DOMContentLoaded', () => {
            const remembered = localStorage.getItem('tapify_user');
            if (remembered) {
                try {
                    const user = JSON.parse(remembered);
                    document.getElementById('email').value = user.email;
                    document.getElementById('remember').checked = true;
                } catch (e) {
                    // Ignore old format
                }
            }
        });
    </script>
</body>
</html>

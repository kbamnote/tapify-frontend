<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Tapify | The Future of Business Networking</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/tapify-logo-green.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d2829 0%, #153e3f 50%, #1e5557 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            z-index: 0;
        }

        body::before {
            width: 450px;
            height: 450px;
            background: #c9933a;
            top: -130px;
            left: -130px;
            animation: float-bg 9s ease-in-out infinite;
        }

        body::after {
            width: 550px;
            height: 550px;
            background: #27706e;
            bottom: -180px;
            right: -180px;
            animation: float-bg 11s ease-in-out infinite reverse;
        }

        /* Dot grid overlay */
        body > * { position: relative; z-index: 1; }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(246,238,230,0.07) 1px, transparent 1px);
            background-size: 38px 38px;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float-bg {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(55px, 55px); }
        }

        .language-selector {
            position: absolute;
            top: 26px;
            right: 32px;
            z-index: 10;
        }

        .lang-btn {
            background: rgba(246,238,230,0.12);
            backdrop-filter: blur(12px);
            color: #f6eee6;
            border: 1px solid rgba(246,238,230,0.25);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.84rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .lang-btn:hover {
            background: rgba(246,238,230,0.22);
        }

        .login-container {
            background: #f6eee6;
            border-radius: 28px;
            padding: 52px 48px;
            max-width: 490px;
            width: 100%;
            box-shadow: 0 30px 90px rgba(13, 40, 41, 0.45), 0 0 0 1px rgba(246,238,230,0.1);
            position: relative;
            z-index: 1;
            animation: slide-up 0.6s cubic-bezier(0.4,0,0.2,1);
        }

        /* Top accent line */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #c9933a, transparent);
            border-radius: 0 0 3px 3px;
        }

        @keyframes slide-up {
            from { transform: translateY(35px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .login-header {
            text-align: center;
            margin-bottom: 38px;
        }

        .login-logo {
            height: 62px;
            width: auto;
            margin-bottom: 22px;
            filter: drop-shadow(0 4px 14px rgba(21, 62, 63, 0.2));
        }

        .login-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.85rem;
            font-weight: 800;
            color: #153e3f;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #3a6b6c;
            font-size: 0.93rem;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #153e3f;
            margin-bottom: 9px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #153e3f;
            font-size: 0.98rem;
            z-index: 2;
            opacity: 0.65;
        }

        .form-input {
            width: 100%;
            height: 56px;
            background: #ede3d8;
            border: 2px solid transparent;
            border-radius: 14px;
            padding: 0 52px 0 52px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #153e3f;
            transition: all 0.3s ease;
        }

        .form-input::placeholder { color: #7a9e9f; }

        .form-input:focus {
            outline: none;
            background: #ffffff;
            border-color: #153e3f;
            box-shadow: 0 0 0 4px rgba(21, 62, 63, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #7a9e9f;
            cursor: pointer;
            font-size: 0.98rem;
            padding: 5px;
            z-index: 2;
            transition: color 0.3s;
        }

        .password-toggle:hover { color: #153e3f; }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #153e3f;
            font-size: 0.88rem;
            cursor: pointer;
            font-weight: 500;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: #153e3f;
            cursor: pointer;
        }

        .forgot-link {
            color: #c9933a;
            font-size: 0.88rem;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #a07a2e;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #153e3f, #1e5557);
            color: #f6eee6;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #c9933a, #dba84f);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .login-btn:hover::before { opacity: 1; }
        .login-btn:hover { color: #153e3f; transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,147,58,0.4); }
        .login-btn:active { transform: translateY(0); }
        .login-btn span, .login-btn i { position: relative; z-index: 1; }

        .divider {
            text-align: center;
            margin: 26px 0;
            position: relative;
            color: #7a9e9f;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #d9c9b8;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .signup-text {
            text-align: center;
            color: #3a6b6c;
            font-size: 0.93rem;
        }

        .signup-text a {
            color: #153e3f;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid #c9933a;
            padding-bottom: 1px;
            transition: color 0.3s;
        }

        .signup-text a:hover { color: #c9933a; }

        .back-home {
            position: absolute;
            top: 26px;
            left: 32px;
            color: #f6eee6;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(246,238,230,0.12);
            backdrop-filter: blur(12px);
            padding: 9px 20px;
            border-radius: 50px;
            border: 1px solid rgba(246,238,230,0.25);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-home:hover {
            background: rgba(246,238,230,0.22);
            color: #f6eee6;
            transform: translateX(-3px);
        }

        .alert-message {
            padding: 13px 18px;
            border-radius: 12px;
            margin-bottom: 22px;
            font-size: 0.88rem;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .alert-message.show { display: flex; }

        .alert-error {
            background: rgba(181,48,62,0.1);
            color: #b5303e;
            border-left: 4px solid #b5303e;
        }

        .alert-success {
            background: rgba(21,62,63,0.1);
            color: #153e3f;
            border-left: 4px solid #153e3f;
        }

        @media (max-width: 576px) {
            .login-container { padding: 38px 26px; }
            .login-header h2 { font-size: 1.55rem; }
            .back-home, .language-selector { top: 16px; }
            .back-home { left: 16px; padding: 7px 15px; font-size: 0.8rem; }
            .language-selector { right: 16px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <a href="index.html" class="back-home">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="language-selector">
        <button class="lang-btn">
            <i class="fas fa-globe me-1"></i> English <i class="fas fa-chevron-down ms-1"></i>
        </button>
    </div>

    <div class="login-container">
        <div class="login-header">
            <img src="images/tapify-logo-green.png" alt="Tapify" class="login-logo">
            <h2>Welcome Back</h2>
            <p>Sign in to manage your Tapify account</p>
        </div>

        <div class="alert-message" id="alertMessage"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-row">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>

        </form>
    </div>

    <script>
        // Password toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.className = 'alert-message alert-' + type + ' show';

            setTimeout(() => {
                alert.classList.remove('show');
            }, 4000);
        }

        // Handle login - Real API call to backend
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const btn = document.querySelector('.login-btn');

            if (!email || !password) {
                showAlert('Please fill all fields', 'error');
                return;
            }

            // Show loading state
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;

            try {
                const response = await fetch('https://tapify-backend-production.up.railway.app/api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // Important for sessions!
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Login successful! Redirecting...', 'success');

                    // Store user info
                    if (remember) {
                        localStorage.setItem('tapify_user', JSON.stringify(result.data.user));
                    } else {
                        sessionStorage.setItem('tapify_user', JSON.stringify(result.data.user));
                    }

                    setTimeout(() => {
                        const user = result.data.user;
                        if (user.role === 'admin') {
                            window.location.href = '/admin/dashboard';
                        } else {
                            window.location.href = '/dashboard/dashboard';
                        }
                    }, 1500);
                } else {
                    showAlert(result.message || 'Login failed', 'error');
                    btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Connection error. Make sure backend is set up. Error: ' + error.message, 'error');
                btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
                btn.disabled = false;
            }
        }

        // Auto-fill if remembered
        window.addEventListener('DOMContentLoaded', () => {
            const remembered = localStorage.getItem('tapify_user');
            if (remembered) {
                try {
                    const user = JSON.parse(remembered);
                    document.getElementById('email').value = user.email;
                    document.getElementById('remember').checked = true;
                } catch (e) {
                    // Ignore old format
                }
            }
        });
    </script>
</body>
</html>

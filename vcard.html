<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | Tapify</title>
    <link rel="icon" type="image/png" href="images/tapify-logo-gold.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f3f4f6; color: #1a2035; }
        .loading-screen { position: fixed; inset: 0; background: #1a2035; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; }
        .loader { width: 50px; height: 50px; border: 4px solid rgba(255,215,0,0.1); border-top-color: #FFD700; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #vcard-container { display: none; min-height: 100vh; }
        .error-msg { text-align: center; padding: 50px; }
    </style>
</head>
<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <p>Loading vCard...</p>
    </div>

    <div id="errorScreen" class="error-msg" style="display:none;">
        <h1 style="color:#ef4444">404</h1>
        <p>vCard not found or inactive.</p>
        <a href="/" style="color:#8338ec">Go back home</a>
    </div>

    <div id="vcard-container">
        <!-- vCard content will be injected here -->
    </div>

    <script>
        const BACKEND_URL = 'https://tapify-backend-production.up.railway.app';

        document.addEventListener('DOMContentLoaded', async () => {
            const path = window.location.pathname;
            const alias = path.split('/').pop();

            if (!alias || alias === 'vcard.html' || alias === 'index.html') {
                window.location.href = '/';
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}/api/vcards/view.php?alias=${alias}`);
                const result = await response.json();

                if (result.success) {
                    displayVcard(result.data.vcard);
                } else {
                    showError();
                }
            } catch (err) {
                console.error(err);
                showError();
            }
        });

        function displayVcard(vcard) {
            document.title = vcard.vcard_name + ' | Tapify';
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('vcard-container').style.display = 'block';

            const coverUrl = vcard.cover_image ? `${BACKEND_URL}/${vcard.cover_image}` : '';
            const profileUrl = vcard.profile_image ? `${BACKEND_URL}/${vcard.profile_image}` : 'images/tapify-logo-gold.png';

            const container = document.getElementById('vcard-container');
            container.innerHTML = `
                <div style="max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 50px rgba(0,0,0,0.1);">
                    <div style="height: 200px; background: ${vcard.primary_color || '#8338ec'}; background-image: url('${coverUrl}'); background-size: cover; background-position: center;"></div>
                    <div style="text-align: center; margin-top: -60px; padding: 0 20px;">
                        <img src="${profileUrl}" style="width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; background: white; object-fit: cover;">
                        <h1 style="margin: 15px 0 5px;">${vcard.vcard_name}</h1>
                        <p style="color: #6b7280; margin: 0;">${vcard.occupation || ''}</p>
                        <div style="margin: 20px 0; font-size: 0.95rem; line-height: 1.6;">${vcard.description || ''}</div>
                        
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0;">
                             ${vcard.social_links.map(l => `
                                <a href="${l.url}" target="_blank" style="color: ${vcard.primary_color || '#8338ec'}; font-size: 1.5rem;"><i class="fab fa-${l.platform.toLowerCase()}"></i></a>
                             `).join('')}
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px;">
                            <a href="tel:${vcard.phone}" style="background: ${vcard.primary_color || '#8338ec'}; color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: 600;"><i class="fas fa-phone"></i> Call Now</a>
                            <a href="mailto:${vcard.email}" style="border: 2px solid ${vcard.primary_color || '#8338ec'}; color: ${vcard.primary_color || '#8338ec'}; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: 600;"><i class="fas fa-envelope"></i> Email Me</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function showError() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('errorScreen').style.display = 'block';
        }
    </script>
</body>
</html>

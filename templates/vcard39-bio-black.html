<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Black | Tapify</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
<link rel="stylesheet" href="_render-demo.css">
<style>
:root{--primary:#fafafa;--secondary:#a3a3a3;--bg:#0a0a0a;--surface:#171717;--text:#fafafa;--muted:#a3a3a3;--cover-h:120px;--font-body:'Inter',sans-serif;--font-heading:'Inter',sans-serif;}
</style>
</head>
<body class="body-dark">
<div class="vcard-container layout-bio-dark theme-dark">
  <div class="cover-section cover-minimal"></div>
  <div class="profile-section profile-minimal">
    <div class="profile-photo shape-circle"><div class="placeholder">J</div></div>
    <h1 class="profile-name">John Doe</h1>
    <p class="profile-title">Content Creator</p>
    <p class="profile-company"><i class="fas fa-at"></i> @johndoe</p>
    <div class="profile-desc">Creating content that matters. Sharing stories, ideas and inspiration every day.</div>
    <a href="#" class="save-contact-btn"><i class="fas fa-user-plus"></i> Save to Contacts</a>
  </div>
  <div class="quick-actions">
    <a href="#" class="quick-action call"><i class="fas fa-phone"></i><span>Call</span></a>
    <a href="#" class="quick-action whatsapp"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
    <a href="#" class="quick-action email"><i class="fas fa-envelope"></i><span>Email</span></a>
    <a href="#" class="quick-action location"><i class="fas fa-map-marker-alt"></i><span>Location</span></a>
    <a href="#" class="quick-action"><i class="fas fa-share-alt"></i><span>Share</span></a>
  </div>
  <div class="section">
    <h3 class="section-title"><i class="fas fa-share-nodes"></i> Connect</h3>
    <div class="social-grid">
      <a href="#" class="social-icon social-instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" class="social-icon social-tiktok"><i class="fab fa-tiktok"></i></a>
      <a href="#" class="social-icon social-youtube"><i class="fab fa-youtube"></i></a>
      <a href="#" class="social-icon social-twitter"><i class="fab fa-x-twitter"></i></a>
      <a href="#" class="social-icon social-linkedin"><i class="fab fa-linkedin-in"></i></a>
    </div>
  </div>
  <div class="vcard-footer"><p>Powered by <a href="#">Tapify</a></p><p style="margin-top:3px;opacity:0.6;">An innovative Product From : <strong>Mr Print World Pvt Ltd.</strong></p></div>
</div>
<script src="_render-demo.js"></script>
</body>
</html>

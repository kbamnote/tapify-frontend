<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate Identity | Tapify</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
<link rel="stylesheet" href="_render-demo.css">
<style>
:root{--primary:#0369a1;--secondary:#0284c7;--bg:#f0f9ff;--surface:#ffffff;--text:#1a2035;--muted:#6b7280;--cover-h:220px;--font-body:'Inter',sans-serif;--font-heading:'Inter',sans-serif;}
</style>
</head>
<body>
<div class="vcard-container layout-split">
  <div class="split-header">
    <div class="split-cover cover-section"><img src="https://images.unsplash.com/photo-1486325212027-8081e485255e?w=500&q=80" alt=""></div>
    <div class="split-profile profile-section">
      <div class="profile-photo shape-circle"><div class="placeholder">J</div></div>
      <h1 class="profile-name">John Doe</h1>
      <p class="profile-title">Brand Director</p>
      <p class="profile-company"><i class="fas fa-building"></i> Identity Corp</p>
      <a href="#" class="save-contact-btn"><i class="fas fa-user-plus"></i> Save Contact</a>
    </div>
  </div>
  <div class="quick-actions">
    <a href="#" class="quick-action call"><i class="fas fa-phone"></i><span>Call</span></a>
    <a href="#" class="quick-action whatsapp"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
    <a href="#" class="quick-action email"><i class="fas fa-envelope"></i><span>Email</span></a>
    <a href="#" class="quick-action location"><i class="fas fa-map-marker-alt"></i><span>Location</span></a>
    <a href="#" class="quick-action"><i class="fas fa-share-alt"></i><span>Share</span></a>
  </div>
  <div class="section">
    <h3 class="section-title"><i class="fas fa-briefcase"></i> Services</h3>
    <div class="services-list">
      <div class="service-item"><div class="service-icon"><i class="fas fa-paint-brush"></i></div><div><strong>Brand Identity</strong><p>Build your brand story</p></div></div>
      <div class="service-item"><div class="service-icon"><i class="fas fa-bullhorn"></i></div><div><strong>Marketing</strong><p>Strategic campaigns</p></div></div>
    </div>
  </div>
  <div class="section">
    <h3 class="section-title"><i class="fas fa-share-nodes"></i> Connect</h3>
    <div class="social-grid">
      <a href="#" class="social-icon social-linkedin"><i class="fab fa-linkedin-in"></i></a>
      <a href="#" class="social-icon social-facebook"><i class="fab fa-facebook-f"></i></a>
      <a href="#" class="social-icon social-instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" class="social-icon social-youtube"><i class="fab fa-youtube"></i></a>
      <a href="#" class="social-icon social-whatsapp"><i class="fab fa-whatsapp"></i></a>
    </div>
  </div>
  <div class="vcard-footer"><p>Powered by <a href="#">Tapify</a></p><p style="margin-top:3px;opacity:0.6;">An innovative Product From : <strong>Mr Print World Pvt Ltd.</strong></p></div>
</div>
</body>
</html>
